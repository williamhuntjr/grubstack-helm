apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: production-cred
      volumes:
        - name: uploads-volume
          nfs:
            server: 107.161.173.73
            path: /var/grubstack/uploads
            readOnly: false
      containers:
        - name: {{ .Chart.Name }}
          volumeMounts:
          - mountPath: /uploads
            name: uploads-volume
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: TENANT_ID
              value: "{{ .Values.customer.tenantId }}"
            - name: DATABASE_HOST
              value: "{{ .Values.database.host }}"
            - name: DATABASE_NAME
              value: "{{ .Values.database.name }}"
            - name: DATABASE_PORT
              value: "{{ .Values.database.port }}"
            - name: DATABASE_USER
              value: "{{ .Values.database.user }}"
            - name: DATABASE_PASSWORD
              value: "{{ .Values.database.password }}"
            - name: DATABASE_SSL
              value: "{{ .Values.database.ssl }}"
            - name: PRODUCTION_DB
              value: "{{ .Values.database.production }}"
            - name: AUTH0_DOMAIN
              value: "{{ .Values.auth0.domain }}"
            - name: AUTH0_AUDIENCE
              value: "{{ .Values.auth0.audience }}"
            - name: ACCESS_TOKEN
              value: "{{ .Values.customer.accessToken }}"
            - name: WEB_APP_URL
              value: "{{ .Values.customer.webAppUrl }}"
            - name: REVALIDATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: grubstack-revalidate-{{ .Values.customer.slug }}
                  key: secret
            - name: PRODUCTION_API_URL
              value: "{{ .Values.customer.productionApiUrl }}"
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grubstack-ai-key
                  key: api_key
            - name: AI_MODEL
              value: "{{ .Values.ai.model }}"
            - name: MAIL_SERVER
              value: "{{ .Values.mail.server }}"
            - name: MAIL_PORT
              value: "{{ .Values.mail.port }}"
            - name: MAIL_USE_TLS
              value: "{{ .Values.mail.useTls }}"
            - name: MAIL_USE_SSL
              value: "{{ .Values.mail.useSsl }}"
            - name: MAIL_USERNAME
              value: "{{ .Values.mail.username }}"
            - name: MAIL_PASSWORD
              value: "{{ .Values.mail.password }}"
            - name: MAIL_DEFAULT_SENDER
              value: "{{ .Values.mail.defaultSender }}"
            - name: MAIL_ENABLED
              value: "{{ .Values.mail.enabled }}"
            - name: MAIL_DEBUG
              value: "{{ .Values.mail.debug }}"
